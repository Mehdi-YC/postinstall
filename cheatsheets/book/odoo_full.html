<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Odoo Dev Reference — Full Stack</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #ffffff;
  --bg2: #f5f5f3;
  --bg3: #eeede8;
  --text: #1a1a18;
  --text2: #6b6b67;
  --text3: #9a9a96;
  --border: rgba(0,0,0,0.12);
  --border2: rgba(0,0,0,0.22);
  --radius: 8px;
  --radius-lg: 12px;
  --mono: 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
  --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #1c1c1a;
    --bg2: #252523;
    --bg3: #2e2e2b;
    --text: #e8e8e4;
    --text2: #9a9a96;
    --text3: #6b6b67;
    --border: rgba(255,255,255,0.1);
    --border2: rgba(255,255,255,0.2);
  }
}
body {
  font-family: var(--sans);
  background: var(--bg3);
  color: var(--text);
  min-height: 100vh;
  padding: 2rem 1rem;
}
.container { max-width: 1100px; margin: 0 auto; }
header { margin-bottom: 2rem; }
header h1 { font-size: 22px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
header p { font-size: 14px; color: var(--text2); }
.tabs { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 1.5rem; }
.tab {
  padding: 6px 14px; font-size: 13px; font-weight: 500;
  border: 0.5px solid var(--border2); border-radius: 20px; cursor: pointer;
  background: transparent; color: var(--text2); font-family: var(--sans);
  transition: all 0.15s;
}
.tab:hover { background: var(--bg2); }
.tab.active { background: var(--text); color: var(--bg); border-color: var(--text); }
.section { display: none; }
.section.active { display: block; }
.card {
  background: var(--bg); border: 0.5px solid var(--border);
  border-radius: var(--radius-lg); padding: 1rem 1.25rem; margin-bottom: 1rem;
}
.card-title {
  font-size: 13px; font-weight: 600; color: var(--text);
  margin-bottom: 0.75rem; display: flex; align-items: center; gap: 8px;
}
.badge {
  font-size: 10px; padding: 2px 7px; border-radius: 10px;
  font-weight: 500; font-family: var(--sans);
}
.b-blue   { background: #E6F1FB; color: #0C447C; }
.b-teal   { background: #E1F5EE; color: #085041; }
.b-amber  { background: #FAEEDA; color: #633806; }
.b-coral  { background: #FAECE7; color: #712B13; }
.b-purple { background: #EEEDFE; color: #3C3489; }
.b-green  { background: #EAF3DE; color: #27500A; }
.b-gray   { background: #F1EFE8; color: #444441; }
@media (prefers-color-scheme: dark) {
  .b-blue   { background: #042C53; color: #85B7EB; }
  .b-teal   { background: #04342C; color: #5DCAA5; }
  .b-amber  { background: #412402; color: #EF9F27; }
  .b-coral  { background: #4A1B0C; color: #F0997B; }
  .b-purple { background: #26215C; color: #AFA9EC; }
  .b-green  { background: #173404; color: #97C459; }
  .b-gray   { background: #2C2C2A; color: #B4B2A9; }
}
pre {
  font-size: 12px; line-height: 1.65; color: var(--text);
  background: var(--bg2); border: 0.5px solid var(--border);
  border-radius: var(--radius); padding: 0.85rem 1rem;
  overflow-x: auto; font-family: var(--mono);
  margin-bottom: 0.5rem;
}
.kw { color: #185FA5; }
.st { color: #3B6D11; }
.cm { color: var(--text3); }
.fn { color: #993C1D; }
@media (prefers-color-scheme: dark) {
  .kw { color: #85B7EB; }
  .st { color: #97C459; }
  .fn { color: #F0997B; }
}
.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
.grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0.75rem; }
@media (max-width: 700px) {
  .grid2, .grid3 { grid-template-columns: 1fr; }
}
.label { font-size: 11px; font-weight: 600; color: var(--text2); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.05em; }
.desc { font-size: 13px; color: var(--text2); line-height: 1.55; margin-bottom: 0.5rem; }
.tag-row { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 0.5rem; }
.mono { font-family: var(--mono); font-size: 11px; }
.divider { height: 0.5px; background: var(--border); margin: 0.75rem 0; }
.row { display: flex; gap: 8px; align-items: flex-start; margin-bottom: 6px; }
.dot { width: 5px; height: 5px; border-radius: 50%; background: var(--text3); margin-top: 7px; flex-shrink: 0; }
.tip {
  background: #E6F1FB; border-left: 3px solid #185FA5;
  border-radius: 0 var(--radius) var(--radius) 0;
  padding: 8px 12px; margin-bottom: 0.75rem;
  font-size: 13px; color: #0C447C;
}
.warn {
  background: #FAEEDA; border-left: 3px solid #BA7517;
  border-radius: 0 var(--radius) var(--radius) 0;
  padding: 8px 12px; margin-bottom: 0.75rem;
  font-size: 13px; color: #633806;
}
@media (prefers-color-scheme: dark) {
  .tip { background: #042C53; color: #85B7EB; border-color: #378ADD; }
  .warn { background: #412402; color: #EF9F27; border-color: #BA7517; }
}
.box { border: 0.5px solid var(--border); border-radius: var(--radius); padding: 10px; }
</style>
</head>

owl: `
<div class="card">
  <div class="card-title">🌿 OWL (Odoo Web Library) — Introduction</div>
  <div class="desc">OWL is a modern, components-based framework used in Odoo 16+ for the backend UI. It replaces legacy widgets. Fully reactive, similar to Vue/React but lightweight and tightly integrated with the Odoo ORM and environment.</div>
  <div class="divider"></div>
  <div class="grid2">
    <div><div class="label">⚡ Basic OWL Component</div>
    <pre><span class="cm">// static/src/js/my_component.js</span>
<span class="kw">import</span> { Component, useState } <span class="kw">from</span> <span class="st">"@odoo/owl"</span>;
<span class="kw">import</span> { registry } <span class="kw">from</span> <span class="st">"@web/core/registry"</span>;

<span class="kw">class</span> <span class="fn">Counter</span> <span class="kw">extends</span> Component {
    setup() {
        this.state = <span class="fn">useState</span>({ count: 0 });
    }
    increment() {
        this.state.count++;
    }
    static template = <span class="st">'my_module.Counter'</span>;
}

<span class="cm">// XML template: static/src/xml/counter.xml</span>
<span class="kw">&lt;templates&gt;</span>
  <span class="kw">&lt;div</span> t-name=<span class="st">"my_module.Counter"</span><span class="kw">&gt;</span>
    &lt;button t-on-click=<span class="st">"increment"</span>&gt;Click me!&lt;/button&gt;
    &lt;p&gt;Count: &lt;t t-esc=<span class="st">"state.count"</span>/&gt;&lt;/p&gt;

    <div><div class="label">☁️ Odoo.sh best practices</div><div class="desc">Production: main branch auto-deploy. Staging: dedicated branch, clone from prod DB. Dev: fresh DB. Use <span class="mono">--dev=all</span> for local. Always test migrations and neutralize emails on staging.</div></div>

<span class="cm"># Disable crons & outgoing mails on staging</span>

psql mydb_staging -c "UPDATE ir_mail_server SET active=false;"

const tabsEl = document.getElementById('tabs');
const contentEl = document.getElementById('content');

sections.forEach((s, i) => {
  const btn = document.createElement('button');
  btn.className = 'tab' + (i === 0 ? ' active' : '');
  btn.textContent = s.label;
  btn.onclick = () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.section').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('sec-' + s.id).classList.add('active');
  };
  tabsEl.appendChild(btn);

  const sec = document.createElement('div');
  sec.className = 'section' + (i === 0 ? ' active' : '');
  sec.id = 'sec-' + s.id;
  sec.innerHTML = html[s.id] || '<div class="card">Content not available</div>';
  contentEl.appendChild(sec);
});
</script>
</body>
</html>
